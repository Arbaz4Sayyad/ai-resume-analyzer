version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: airesume-postgres
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: airesumeanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../ai-service
    container_name: airesume-ai-service
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_started

  backend:
    build:
      context: ../backend
    container_name: airesume-backend
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/airesumeanalyzer
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-c3VwZXItc2VjcmV0LWtleS1mb3Itand0LTI1Ni1iaXQtbGVuZ3RoLXRlc3Q=}
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    container_name: airesume-frontend
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data: